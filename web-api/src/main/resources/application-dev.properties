env=dev
project=web-api
site=default
server.port=8081
server.servlet.context-path=/ums

# core api config
core.api.url=http://localhost:8091
core.api.timeout=10000
core.api.key=${API_KEY:changeme-dev-api-key-2024}

# session config
core.session.timeout-minutes=30
core.session.cleanup-interval=300000

# BFF cookie config
bff.cookie.token-name=rbac_token
bff.cookie.refresh-name=rbac_refresh
bff.cookie.path=/
bff.cookie.same-site=Lax
bff.cookie.secure=false
bff.cookie.token-ttl-seconds=1800
bff.cookie.refresh-ttl-seconds=604800

# CORS for SPA dev server
bff.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# BFF: pooled HTTP client to core-api (keeps the extra hop's TCP+TLS handshake amortized)
bff.http.max-total=200
bff.http.max-per-route=50
bff.http.keep-alive-seconds=30

# BFF: response cache for safe GETs (per-user keys; short TTL keeps it useful but stale-resistant)
bff.cache.ttl-seconds=20
bff.cache.max-entries=2000
bff.cache.cacheable-paths=/v1/users/me,/v1/notifications/unread-count,/v1/tenants

# BFF: SPA root for OAuth2 callback redirect
bff.spa.url=http://localhost:5173

# Actuator + Prometheus (BFF observability)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=read_only
management.metrics.tags.application=web-api

# web config
spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html