env=dev
project=web-api
site=default
server.port=8081
server.servlet.context-path=/ums

# core api config
core.api.url=http://localhost:8091
core.api.timeout=10000
core.api.key=${API_KEY:changeme-dev-api-key-2024}

# session config
core.session.timeout-minutes=30
core.session.cleanup-interval=300000

# BFF cookie config
bff.cookie.token-name=rbac_token
bff.cookie.refresh-name=rbac_refresh
bff.cookie.path=/
bff.cookie.same-site=Lax
bff.cookie.secure=false
bff.cookie.token-ttl-seconds=1800
bff.cookie.refresh-ttl-seconds=604800

# CORS for SPA dev server
bff.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# web config
spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html