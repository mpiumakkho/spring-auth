# Production profile for web-api (BFF).

env=prod
project=web-api
site=${SITE:default}
server.port=${PORT:8081}

# Force HTTPS-aware cookie flags + same-site
server.forward-headers-strategy=native

# core-api endpoint + inter-service key (must be set in env)
core.api.url=${CORE_API_URL}
core.api.timeout=${CORE_API_TIMEOUT_MS:10000}
core.api.key=${API_KEY}

# BFF cookies — Secure flag ON for HTTPS prod, SameSite stricter
bff.cookie.token-name=rbac_token
bff.cookie.refresh-name=rbac_refresh
bff.cookie.path=/
bff.cookie.same-site=${BFF_COOKIE_SAMESITE:Strict}
bff.cookie.secure=true
bff.cookie.token-ttl-seconds=${BFF_TOKEN_TTL_SEC:1800}
bff.cookie.refresh-ttl-seconds=${BFF_REFRESH_TTL_SEC:604800}

# CORS — exact origin, never wildcard, never localhost
bff.cors.allowed-origins=${SPA_ORIGINS}

# SPA URL for OAuth2 callback bounce
bff.spa.url=${SPA_URL}

# Pooled HTTP client to core-api
bff.http.max-total=${BFF_HTTP_MAX_TOTAL:500}
bff.http.max-per-route=${BFF_HTTP_MAX_PER_ROUTE:100}
bff.http.keep-alive-seconds=${BFF_HTTP_KEEPALIVE_SEC:30}

# Response cache
bff.cache.ttl-seconds=${BFF_CACHE_TTL_SEC:20}
bff.cache.max-entries=${BFF_CACHE_MAX:5000}
bff.cache.cacheable-paths=${BFF_CACHE_PATHS:/v1/users/me,/v1/notifications/unread-count,/v1/tenants}

# Actuator: behind a network policy or basic-auth in prod, expose minimum
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.access=read_only
management.metrics.tags.application=web-api

# Logging
logging.level.root=INFO
logging.level.com.mp.web=INFO
