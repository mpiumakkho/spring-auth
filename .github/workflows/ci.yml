name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

jobs:
  core-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: core-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test (with PostgreSQL)
        env:
          DB_URL: jdbc:postgresql://localhost:5432/postgres
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: ./mvnw -B verify

      - name: Upload core-api jar
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: core-api-jar
          path: core-api/target/*.jar
          retention-days: 14

  web-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        run: ./mvnw -B verify

      - name: Upload web-api jar
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: web-api-jar
          path: web-api/target/*.jar
          retention-days: 14

  docker:
    needs: [core-api, web-api]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build core-api image
        uses: docker/build-push-action@v6
        with:
          context: ./core-api
          push: false
          tags: rbac-ums/core-api:${{ github.sha }}

      - name: Build web-api image
        uses: docker/build-push-action@v6
        with:
          context: ./web-api
          push: false
          tags: rbac-ums/web-api:${{ github.sha }}
