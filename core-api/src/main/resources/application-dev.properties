# application-dev.properties
env=dev
project=core-api
site=default
server.port=8091

# dev
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:P@ss4321}
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa config
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=sample_app

# flyway config
spring.flyway.enabled=true
spring.flyway.schemas=sample_app
spring.flyway.baseline-on-migrate=true

# logging config
logging.level.org.hibernate.orm.connections.pooling=WARN
logging.level.org.hibernate.jpa.internal.util.LogHelper=WARN
logging.level.org.hibernate.Version=WARN
logging.level.org.hibernate.engine.transaction.jta.platform.internal.JtaPlatformInitiator=WARN

# security config
app.security.aes-key=${AES_KEY:1234567890123456}
app.security.api-key=${API_KEY:changeme-dev-api-key-2024}
app.security.rate-limit.max-requests=10
app.security.rate-limit.window-seconds=60

# JWT (HS256) - dev secret only; rotate in prod via env
app.security.jwt.secret=${JWT_SECRET:dev-secret-key-change-me-please-use-32-bytes-min-please}
app.security.jwt.access-ttl-minutes=${JWT_ACCESS_TTL_MIN:30}
app.security.jwt.issuer=${JWT_ISSUER:rbac-ums}

# OAuth2 success redirect — BFF callback that swaps token+refresh into cookies.
# When deployed without a BFF, point this directly at the SPA, e.g. http://localhost:5173/oauth2/callback
app.security.oauth2.success-redirect=${OAUTH2_SUCCESS_REDIRECT:http://localhost:8081/bff/auth/oauth2-callback}

# OAuth2 client registrations — uncomment + supply credentials to activate.
# When none are set, OAuth2SecurityConfig stays disabled (no /oauth2/** routes).
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.google.scope=openid,email,profile
# spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
# spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.github.scope=read:user,user:email

# Refresh token TTL (days)
core.security.refresh-token.ttl-days=${REFRESH_TTL_DAYS:7}

# Avatar upload (local disk in dev; switch to S3 in prod via profile)
core.upload.avatar-dir=${AVATAR_DIR:./uploads/avatars}
core.upload.avatar-base-url=${AVATAR_BASE_URL:/files/avatars}
core.upload.max-bytes=${UPLOAD_MAX_BYTES:2097152}

# Multipart limits
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=4MB

# Cache: in-memory in dev (Redis driver still on classpath; switch with spring.cache.type=redis)
spring.cache.type=${CACHE_TYPE:simple}
spring.cache.cache-names=userRoles,rolePermissions,userAttributes
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Skip Redis health probe so the dev profile doesn't go DOWN when Redis is absent
management.health.redis.enabled=false

# Async event-driven audit + notification
core.async.core-pool-size=2
core.async.max-pool-size=8
core.async.queue-capacity=200

# Kafka bridge (optional). Set spring.kafka.bootstrap-servers to enable —
# KafkaEventBridge republishes audit + notification events to
# rbac-ums.audit / rbac-ums.notifications topics for downstream consumers.
# In-process @Async listeners keep working either way.
# spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
# spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# spring.kafka.producer.properties.spring.json.add.type.headers=false

# actuator + prometheus
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.prometheus.access=read_only
management.health.db.enabled=true
management.health.disk-space.enabled=true
management.info.env.enabled=true
management.metrics.tags.application=core-api