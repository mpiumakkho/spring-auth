# Production profile for core-api.
# Every secret MUST come from the environment — fail fast if missing.

env=prod
project=core-api
site=${SITE:default}
server.port=${PORT:8091}

# Datasource — credentials in env, never in this file
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA + Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:sample_app}
spring.flyway.enabled=true
spring.flyway.schemas=${DB_SCHEMA:sample_app}
spring.flyway.baseline-on-migrate=false

# Logging
logging.level.root=INFO
logging.level.com.mp.core=INFO
logging.level.org.hibernate.SQL=WARN

# Security — secrets MUST be set in env, no defaults
app.security.aes-key=${AES_KEY}
app.security.api-key=${API_KEY}
app.security.rate-limit.max-requests=${RATE_LIMIT_MAX:30}
app.security.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SEC:60}

# JWT — secret MUST be set, must be ≥ 32 bytes
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-ttl-minutes=${JWT_ACCESS_TTL_MIN:15}
app.security.jwt.issuer=${JWT_ISSUER:rbac-ums}

# OAuth2 redirect goes to BFF in prod
app.security.oauth2.success-redirect=${OAUTH2_SUCCESS_REDIRECT}

# Refresh token TTL
core.security.refresh-token.ttl-days=${REFRESH_TTL_DAYS:7}

# Avatar upload — point at S3-mounted volume or object-storage proxy in prod
core.upload.avatar-dir=${AVATAR_DIR}
core.upload.avatar-base-url=${AVATAR_BASE_URL}
core.upload.max-bytes=${UPLOAD_MAX_BYTES:2097152}
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=4MB

# Cache — switch to redis in prod
spring.cache.type=${CACHE_TYPE:redis}
spring.cache.cache-names=userRoles,rolePermissions,userAttributes
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
management.health.redis.enabled=true

# Async event executor
core.async.core-pool-size=${ASYNC_CORE_POOL:4}
core.async.max-pool-size=${ASYNC_MAX_POOL:32}
core.async.queue-capacity=${ASYNC_QUEUE_CAPACITY:1000}

# Kafka — optional but typical in prod
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# CORS — exact origin, no wildcards in prod
core.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Actuator — limit exposure to ops needs
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.prometheus.access=read_only
management.health.db.enabled=true
management.health.disk-space.enabled=true
management.metrics.tags.application=core-api
