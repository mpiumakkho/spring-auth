services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rbac-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ss4321
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rbac-network

  # core-api: REST + RBAC + ABAC + multi-tenancy
  core-api:
    build:
      context: ./core-api
      dockerfile: Dockerfile
    container_name: rbac-core-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: P@ss4321
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rbac-network

  # web-api: BFF for the SPA
  web-api:
    build:
      context: ./web-api
      dockerfile: Dockerfile
    container_name: rbac-web-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CORE_API_URL: http://core-api:8091
      SPA_ORIGINS: http://localhost
      SPA_URL: http://localhost
    ports:
      - "8081:8081"
    depends_on:
      core-api:
        condition: service_healthy
    networks:
      - rbac-network

  # frontend: React SPA + nginx reverse-proxy to web-api (BFF)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /bff/api/v1
    container_name: rbac-frontend
    ports:
      - "80:80"
    depends_on:
      - web-api
    networks:
      - rbac-network

  # Prometheus — scrapes /actuator/prometheus from core-api + web-api
  prometheus:
    image: prom/prometheus:latest
    container_name: rbac-prometheus
    profiles: [observability]
    ports:
      - "9090:9090"
    volumes:
      - ./docs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - rbac-network

  # Grafana — pre-provisioned with the rbac-ums dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: rbac-grafana
    profiles: [observability]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docs/observability/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - rbac-network

  # Kafka (single-broker KRaft) — opt-in via --profile kafka.
  # KafkaEventBridge in core-api activates automatically when SPRING_KAFKA_BOOTSTRAP_SERVERS
  # is set on the core-api container (you'll have to add it to that service yourself
  # when running with this profile).
  kafka:
    image: bitnami/kafka:3.7
    container_name: rbac-kafka
    profiles: [kafka]
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - rbac-network

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  kafka_data:
    driver: local

networks:
  rbac-network:
    driver: bridge
