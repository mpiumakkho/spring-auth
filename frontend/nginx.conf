# nginx config for the production SPA container.
# Browser hits this nginx for both the SPA bundle and the BFF — they're
# same-origin so cookies work without CORS gymnastics.

server {
    listen 80 default_server;
    server_name _;

    # Compression for SPA assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Long cache for hashed assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health probe used by Docker healthcheck
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy BFF traffic. The web-api hostname resolves via the docker-compose
    # network ("web-api" = service name).
    location /bff/ {
        proxy_pass         http://web-api:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 30s;
    }

    # SPA fallback — every other path returns index.html (React Router owns it)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
